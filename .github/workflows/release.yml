name: Release

# Build the game binary when a version tag (v*) is pushed, and attach
# zipped binary + assets/ to a GitHub Release for that tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release + upload artifacts

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: tileworld-windows-x86_64
            binary: target/release/tileworld_bevy_forest.exe
          - os: ubuntu-latest
            artifact: tileworld-linux-x86_64
            binary: target/release/tileworld_bevy_forest

    steps:
      - uses: actions/checkout@v4

      # Bevy's standard Linux link deps: Wayland + XKB (windowing/input),
      # ALSA (the `wav` audio feature), libudev (gamepad enumeration).
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libudev-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      # The game loads WGSL/audio/fonts from assets/ next to the exe
      # (or via BEVY_ASSET_ROOT), so ship the folder alongside the binary.
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist/${{ matrix.artifact }} | Out-Null
          Copy-Item ${{ matrix.binary }} dist/${{ matrix.artifact }}/
          Copy-Item -Recurse assets dist/${{ matrix.artifact }}/assets
          Compress-Archive -Path dist/${{ matrix.artifact }}/* -DestinationPath dist/${{ matrix.artifact }}.zip

      # Build the MSI installer (WiX 6, a dotnet global tool). The exe already carries its
      # embedded icon + version metadata from build.rs, so the installer + installed shortcut
      # are branded with no extra work here.
      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix build installer/tileworld.wxs -arch x64 -d SourceDir="$env:GITHUB_WORKSPACE" -o "dist/Warbell-${{ github.ref_name }}-setup.msi"

      # Self-sign the MSI so it carries an Authenticode signature (Digital Signatures tab shows
      # "Warbell (self-signed)"). NOTE: a self-signed cert does NOT chain to a trusted root, so
      # end users still see a SmartScreen warning / "Unknown Publisher" in UAC. Removing those
      # warnings requires a real CA code-signing certificate. To swap one in: store the .pfx as a
      # base64 secret, import it here instead of New-SelfSignedCertificate, and sign with its
      # thumbprint — the signtool invocation stays identical.
      - name: Self-sign MSI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigningCert `
            -Subject "CN=Warbell (self-signed), O=miskibin" `
            -KeyUsage DigitalSignature -FriendlyName "Warbell code signing" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -KeyExportPolicy Exportable -KeySpec Signature `
            -HashAlgorithm SHA256
          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\' } | Sort-Object FullName -Descending | Select-Object -First 1
          Write-Host "Using signtool: $($signtool.FullName)"
          $msi = "dist/Warbell-${{ github.ref_name }}-setup.msi"
          & $signtool.FullName sign /fd SHA256 /sha1 $cert.Thumbprint `
            /tr http://timestamp.digicert.com /td SHA256 $msi
          if ($LASTEXITCODE -ne 0) { throw "signtool sign failed ($LASTEXITCODE)" }
          # Confirm the signature + timestamp are present. We can't use `signtool verify /pa`
          # here: it demands a chain to a trusted root, and a self-signed cert isn't trusted
          # (and adding it to the Root store pops a consent dialog that fails non-interactively).
          # Get-AuthenticodeSignature reports the signer/timestamp without requiring trust.
          $sig = Get-AuthenticodeSignature $msi
          Write-Host "Signature status : $($sig.Status)  (NotTrusted/UnknownError is expected for a self-signed cert)"
          Write-Host "Signer           : $($sig.SignerCertificate.Subject)"
          Write-Host "Timestamp        : $($sig.TimeStamperCertificate.Subject)"
          if (-not $sig.SignerCertificate) { throw "MSI is not signed" }

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp ${{ matrix.binary }} dist/${{ matrix.artifact }}/
          cp -r assets dist/${{ matrix.artifact }}/assets
          tar -C dist -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          # The MSI line only matches on the Windows runner; on Linux it is skipped silently
          # thanks to fail_on_unmatched_files: false.
          files: |
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.tar.gz
            dist/Warbell-${{ github.ref_name }}-setup.msi
          fail_on_unmatched_files: false
          generate_release_notes: true

      # Hand the packaged build to the itch.io publish job below. We ship the
      # archive (not the raw dir) because workflow artifacts strip the Linux
      # executable bit; the tar.gz preserves it.
      - name: Upload artifact for itch.io
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  # Push both platform builds to itch.io (https://miskibin.itch.io/warbell) via butler.
  # Needs the BUTLER_API_KEY repo secret (itch.io → Settings → API keys); if it's absent
  # (e.g. a fork) the job warns and skips instead of failing the release. Channels
  # `windows` / `linux` are created by butler on first push; --userversion stamps the
  # tag's version so the itch.io app can diff/auto-update between releases.
  itch:
    name: Publish to itch.io
    needs: build
    runs-on: ubuntu-latest
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      ITCH_TARGET: miskibin/warbell
    steps:
      - name: Warn if BUTLER_API_KEY is not configured
        if: env.BUTLER_API_KEY == ''
        run: echo "::warning::BUTLER_API_KEY secret not set — skipping itch.io publish"

      - name: Download build artifacts
        if: env.BUTLER_API_KEY != ''
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Install butler
        if: env.BUTLER_API_KEY != ''
        run: |
          curl -fsSL -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip -d butler
          chmod +x butler/butler
          ./butler/butler -V

      - name: Push to itch.io
        if: env.BUTLER_API_KEY != ''
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Re-extract so butler pushes plain directories (better patch diffing than
          # pushing the archives themselves). The Windows zip has no wrapper dir
          # (Compress-Archive of dir/*); the Linux tar wraps everything in the
          # artifact-name dir, hence --strip-components.
          mkdir -p push/windows push/linux
          unzip -q dist/tileworld-windows-x86_64/tileworld-windows-x86_64.zip -d push/windows
          tar -xzf dist/tileworld-linux-x86_64/tileworld-linux-x86_64.tar.gz -C push/linux --strip-components=1
          ./butler/butler push push/windows "$ITCH_TARGET:windows" --userversion "$VERSION"
          ./butler/butler push push/linux "$ITCH_TARGET:linux" --userversion "$VERSION"
